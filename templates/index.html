<!DOCTYPE html>
<html>
<head>
    <title>Simulador Fotovoltaico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">

<h2 class="text-center mb-4">Sistema Fotovoltaico</h2>

<form method="post">
<table class="table table-dark table-bordered text-center">

{% for i in range(5) %}
<tr>
{% for j in range(6) %}
<td><input class="form-control" type="number" step="any" name="a{{i}}{{j}}" required></td>
{% endfor %}
</tr>
{% endfor %}

</table>

<div class="text-center">
<button class="btn btn-success">Resolver</button>
</div>
</form>

{% if gs %}
<div class="card mt-4 bg-secondary">
<div class="card-body">

<h4>Resultados</h4>

<p><b>Gauss-Seidel:</b> {{ gs }}</p>
<p><b>SOR:</b> {{ sor }}</p>
<p><b>Gradiente Conjugado:</b> {{ cg }}</p>

</div>
</div>
{% endif %}

</div>

</body>
</html>
